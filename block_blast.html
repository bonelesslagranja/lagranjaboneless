<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLOCK BLAST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
:root{--bg:#0a0814;--bg2:#12102a;--bg3:#1c1a3a;--cell:#181630;--cb:#252250;--text:#f0eaff;--sub:#8877bb;--accent:#d966ff;}
html,body{height:100%;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:bf 9s ease-in-out infinite;}
.b1{width:420px;height:420px;background:rgba(110,30,210,0.16);top:-12%;left:-12%;}
.b2{width:320px;height:320px;background:rgba(210,70,255,0.1);bottom:-8%;right:-8%;animation-delay:-3.5s;}
.b3{width:260px;height:260px;background:rgba(30,130,255,0.07);top:38%;left:58%;animation-delay:-7s;}
@keyframes bf{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,18px);}}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .35s,transform .35s;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.96);}
#particles{position:fixed;inset:0;pointer-events:none;z-index:200;}
#flashMsg{position:fixed;top:27%;left:50%;transform:translateX(-50%);font-family:'Fredoka One',cursive;font-size:46px;pointer-events:none;z-index:500;white-space:nowrap;opacity:0;}
#flashMsg.show{animation:fa .75s ease-out forwards;}
@keyframes fa{0%{opacity:0;transform:translateX(-50%) scale(0.5);}20%{opacity:1;transform:translateX(-50%) scale(1.1);}60%{opacity:1;transform:translateX(-50%) scale(1);}100%{opacity:0;transform:translateX(-50%) scale(0.8) translateY(-28px);}}
#ghost{position:fixed;pointer-events:none;z-index:1000;display:none;opacity:0.9;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.5));}
#ghost .pcell{border-radius:8px;}

/* ═══ MENU ═══ */
.menu-logo{font-family:'Fredoka One',cursive;font-size:52px;letter-spacing:2px;background:linear-gradient(135deg,#ff6bff,#5bc8ff,#ff6bff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:ls 3s linear infinite;margin-bottom:4px;filter:drop-shadow(0 0 20px rgba(200,100,255,0.4));}
@keyframes ls{0%{background-position:0%}100%{background-position:200%}}
.menu-sub{font-size:11px;color:var(--sub);letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;}
.mode-cards{display:flex;gap:14px;margin-bottom:20px;}
.mc{width:148px;padding:20px 12px;border-radius:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;border:2px solid var(--cb);background:var(--bg2);transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;}
.mc:hover{transform:translateY(-5px) scale(1.03);}
.mc.cc:hover{box-shadow:0 8px 28px rgba(91,200,255,.3);border-color:rgba(91,200,255,.5);}
.mc.rc:hover{box-shadow:0 8px 28px rgba(255,107,255,.35);border-color:rgba(255,107,255,.5);}
.mc:active{transform:scale(0.97);}
.mc-icon{font-size:38px;}.mc-name{font-family:'Fredoka One',cursive;font-size:18px;}
.mc-desc{font-size:10px;color:var(--sub);text-align:center;line-height:1.5;}
.mc-badge{position:absolute;top:8px;right:8px;font-size:8px;font-weight:900;padding:2px 7px;border-radius:20px;background:rgba(255,107,255,.2);color:#ff6bff;border:1px solid rgba(255,107,255,.4);}
.cc .mc-name{color:#5bc8ff;}.rc .mc-name{color:#ff6bff;}
.menu-bottom{display:flex;align-items:center;gap:10px;}
.menu-rank-box{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:14px;padding:10px 16px;border:2px solid var(--cb);}
.mrb-icon{font-size:26px;}.mrb-name{font-family:'Fredoka One',cursive;font-size:16px;}.mrb-pts{font-size:10px;color:var(--sub);}
.icon-btn{width:46px;height:46px;border-radius:13px;background:var(--bg2);border:2px solid var(--cb);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .15s;flex-shrink:0;color:var(--sub);}
.icon-btn:hover{border-color:var(--accent);color:var(--text);}
#btnOpenSettings:hover{transform:rotate(30deg) scale(1.08);}

/* ═══ SETTINGS PANEL (shared) ═══ */
.spanel{width:340px;background:var(--bg2);border-radius:24px;border:2px solid var(--cb);padding:22px;display:flex;flex-direction:column;gap:14px;max-height:86vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--cb) transparent;box-shadow:0 24px 60px rgba(0,0,0,0.6);}
.spanel::-webkit-scrollbar{width:4px;}.spanel::-webkit-scrollbar-thumb{background:var(--cb);border-radius:2px;}
.sh{display:flex;align-items:center;justify-content:space-between;}
.sttl{font-family:'Fredoka One',cursive;font-size:21px;background:linear-gradient(135deg,#ff6bff,#5bc8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sclose{width:32px;height:32px;border-radius:10px;background:var(--bg3);border:1px solid var(--cb);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:color .2s;flex-shrink:0;}
.sclose:hover{color:var(--text);}
.ssec{display:flex;flex-direction:column;gap:8px;}
.ssec-t{font-size:9px;color:var(--sub);letter-spacing:3px;text-transform:uppercase;}
.srow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--cb);}
.srow:last-child{border-bottom:none;}
.slw{display:flex;flex-direction:column;gap:2px;flex:1;}
.slbl{font-size:13px;font-weight:800;}
.sdesc{font-size:10px;color:var(--sub);}
.tog{position:relative;width:46px;height:24px;flex-shrink:0;cursor:pointer;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-tr{position:absolute;inset:0;border-radius:12px;background:var(--bg3);border:1px solid var(--cb);transition:background .25s,border-color .25s;}
.tog input:checked + .tog-tr{background:var(--accent);border-color:var(--accent);}
.tog-th{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--sub);transition:transform .25s,background .25s;pointer-events:none;}
.tog input:checked ~ .tog-th{transform:translateX(22px);background:#fff;}
.swrap{display:flex;flex-direction:column;gap:5px;padding:8px 0;border-bottom:1px solid var(--cb);}
.swrap:last-child{border-bottom:none;}
.swrow{display:flex;align-items:center;gap:8px;}
.ssl{-webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:3px;background:var(--bg3);border:1px solid var(--cb);outline:none;cursor:pointer;}
.ssl::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 5px rgba(217,102,255,0.5);}
.sval{font-family:'Fredoka One',cursive;font-size:12px;color:var(--accent);min-width:30px;text-align:right;}
.song-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.song-btn{padding:8px 10px;border-radius:12px;background:var(--bg3);border:2px solid var(--cb);cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:2px;}
.song-btn:hover{border-color:var(--accent);}
.song-btn.active{border-color:var(--accent);background:rgba(217,102,255,0.12);}
.song-top{display:flex;align-items:center;justify-content:space-between;}
.song-title{font-size:12px;font-weight:800;}
.song-desc{font-size:9px;color:var(--sub);}
.pbars{display:flex;align-items:flex-end;gap:2px;height:12px;}
.pbars span{display:block;width:3px;background:var(--accent);border-radius:2px;animation:pb .6s ease-in-out infinite;}
.pbars span:nth-child(2){animation-delay:.15s;}.pbars span:nth-child(3){animation-delay:.3s;}
@keyframes pb{0%,100%{height:3px;}50%{height:11px;}}
.song-btn:not(.active) .pbars{display:none;}
.theme-row{display:flex;gap:8px;flex-wrap:wrap;}
.tdot{width:34px;height:34px;border-radius:10px;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;position:relative;}
.tdot:hover{transform:scale(1.1);}
.tdot.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,0.3);}
.tdot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;}
.btn-reset{width:100%;padding:10px;border-radius:12px;background:rgba(255,60,60,0.1);border:2px solid rgba(255,60,60,0.3);color:#ff6b6b;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:background .2s,border-color .2s;}
.btn-reset:hover{background:rgba(255,60,60,0.2);border-color:rgba(255,60,60,0.6);}

/* ═══ IN-GAME SETTINGS OVERLAY ═══ */
.ig-overlay{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(5,3,16,0.75);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .25s;}
.ig-overlay.show{opacity:1;pointer-events:all;}

/* ═══ GAME SCREEN ═══ */
#gameScreen{justify-content:center;}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px;width:100%;max-width:420px;}
.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.btn-back{background:var(--bg2);border:1px solid var(--cb);border-radius:10px;color:var(--sub);font-size:18px;cursor:pointer;padding:6px 10px;transition:color .2s;font-family:inherit;}
.btn-back:hover{color:var(--text);}
.score-box{text-align:center;background:var(--bg2);border:2px solid var(--cb);border-radius:14px;padding:4px 14px;min-width:78px;}
.score-lbl{font-size:8px;color:var(--sub);letter-spacing:2px;}
.score-val{font-size:20px;font-weight:900;transition:transform .1s;}
.score-val.pop{transform:scale(1.35);}
.best-box{text-align:center;padding:4px 8px;}
.best-lbl{font-size:8px;color:var(--sub);letter-spacing:2px;}
.best-val{font-size:15px;font-weight:900;color:var(--accent);}
.btn-gear{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1px solid var(--cb);color:var(--sub);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s,transform .15s;flex-shrink:0;}
.btn-gear:hover{color:var(--accent);transform:rotate(30deg);}

#rankBar{width:100%;background:var(--bg2);border:2px solid var(--cb);border-radius:14px;padding:8px 14px;display:flex;align-items:center;gap:10px;}
#rankBar.hidden{display:none;}
.rb-icon{font-size:26px;flex-shrink:0;}.rb-info{flex:1;min-width:0;}
.rb-name{font-family:'Fredoka One',cursive;font-size:14px;}
.rb-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.rb-pts{font-size:9px;color:var(--sub);white-space:nowrap;}
.rb-bar{flex:1;height:7px;background:var(--cell);border-radius:4px;}
.rb-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(0.34,1.56,0.64,1);}
.rb-next{font-size:9px;color:var(--sub);white-space:nowrap;}

#boardWrap{position:relative;border-radius:18px;padding:3px;background:linear-gradient(135deg,rgba(255,107,255,.3),rgba(91,200,255,.2));box-shadow:0 8px 40px rgba(0,0,0,.5);}
#board{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);gap:3px;background:var(--bg2);border-radius:16px;padding:8px;width:320px;height:320px;}
.cell{border-radius:6px;background:var(--cell);border:1px solid var(--cb);transition:transform .08s,background .08s;position:relative;overflow:hidden;}
.cell.filled{border:none;box-shadow:inset 0 -3px 0 rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.25);}
.cell.filled::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);border-radius:inherit;}
.cell.hl{background:rgba(255,255,255,.12)!important;border:1px solid rgba(255,255,255,.3)!important;transform:scale(0.95);}
.cell.inv{background:rgba(255,80,80,.15)!important;border:1px solid rgba(255,80,80,.4)!important;}
.cell.clearing{animation:pop .35s ease-out forwards;}
@keyframes pop{0%{transform:scale(1);opacity:1;}40%{transform:scale(1.25);}100%{transform:scale(0);opacity:0;}}
.cell.fi{animation:fi .25s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes fi{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}

#tray{width:100%;display:flex;align-items:center;justify-content:space-around;gap:8px;background:var(--bg2);border:2px solid var(--cb);border-radius:18px;padding:10px 6px;min-height:90px;}
.ps{flex:1;display:flex;align-items:center;justify-content:center;min-height:70px;cursor:grab;border-radius:12px;transition:transform .2s;padding:4px;}
.ps:active{cursor:grabbing;}.ps.used{opacity:.2;pointer-events:none;}.ps.ds{opacity:.35;transform:scale(.9);}
.piece-grid{display:inline-grid;gap:2px;pointer-events:none;}
.pcell{border-radius:5px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.3),inset 0 2px 0 rgba(255,255,255,.25);position:relative;overflow:hidden;}
.pcell::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 60%);}
.pcell.empty{background:transparent!important;box-shadow:none;}.pcell.empty::after{display:none;}
.combo-row{font-size:11px;color:var(--sub);letter-spacing:1px;display:flex;align-items:center;gap:4px;}
.combo-val{font-weight:900;color:var(--accent);font-size:14px;}

/* ═══ GAME OVER ═══ */
#gameOver{position:fixed;inset:0;z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(8,6,20,.92);backdrop-filter:blur(8px);}
#gameOver.show{display:flex;animation:fdIn .4s ease;}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
.go-title{font-family:'Fredoka One',cursive;font-size:52px;background:linear-gradient(135deg,#ff4d6d,#ff6bff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,80,120,.5));}
.go-row{font-size:13px;color:var(--sub);letter-spacing:1px;text-align:center;}
.go-row span{color:var(--text);font-size:30px;font-weight:900;display:block;margin-top:2px;}
#rupCard{display:none;flex-direction:column;align-items:center;gap:5px;padding:12px 28px;background:var(--bg2);border-radius:16px;border:2px solid #fff;}
#rupCard.show{display:flex;animation:ruA .5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes ruA{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.rup-title{font-size:10px;letter-spacing:3px;color:var(--sub);}
.rup-icon{font-size:48px;animation:rib .6s cubic-bezier(0.34,1.56,0.64,1) .2s both;}
@keyframes rib{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.rup-name{font-family:'Fredoka One',cursive;font-size:22px;}
.go-btn-row{display:flex;gap:12px;margin-top:6px;}
.go-btn{font-family:'Fredoka One',cursive;font-size:16px;padding:12px 24px;border:none;border-radius:50px;cursor:pointer;transition:transform .1s;}
.go-btn:hover{transform:scale(1.06);}.go-btn:active{transform:scale(.97);}
.go-btn-play{background:linear-gradient(135deg,#ff6bff,#5bc8ff);color:#fff;box-shadow:0 4px 20px rgba(255,107,255,.35);}
.go-btn-menu{background:var(--bg2);color:var(--sub);border:2px solid var(--cb);}
#rupOv{position:fixed;inset:0;z-index:800;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.ruo-card{pointer-events:none;background:var(--bg2);border-radius:22px;padding:26px 46px;display:flex;flex-direction:column;align-items:center;gap:6px;border:3px solid #fff;opacity:0;}
.ruo-card.go{animation:ruoA 2.2s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes ruoA{0%{opacity:0;transform:scale(.3) rotate(-10deg);}18%{opacity:1;transform:scale(1.08) rotate(2deg);}30%{transform:scale(1) rotate(0);}70%{opacity:1;}100%{opacity:0;transform:scale(.9) translateY(-24px);}}
.ruo-lbl{font-size:10px;letter-spacing:3px;color:var(--sub);}
.ruo-icon{font-size:58px;}.ruo-name{font-family:'Fredoka One',cursive;font-size:28px;}

/* ═══ THEMES ═══ */
body.t-ocean{--bg:#060e18;--bg2:#0d1e2e;--bg3:#162840;--cell:#0e1e30;--cb:#1e3a50;--accent:#00d4ff;}
body.t-forest{--bg:#060f08;--bg2:#0d1f10;--bg3:#162818;--cell:#0e1f12;--cb:#1e3f22;--accent:#4dff91;}
body.t-sunset{--bg:#180a06;--bg2:#2a120d;--bg3:#3a1a12;--cell:#2a1010;--cb:#4a2020;--accent:#ff6b3c;}
body.t-rose{--bg:#180610;--bg2:#2a0d1e;--bg3:#3a1228;--cell:#2a0e1a;--cb:#4a1e30;--accent:#ff6baa;}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<canvas id="particles"></canvas>
<div id="ghost"><div class="piece-grid" id="ghostGrid"></div></div>
<div id="flashMsg"></div>

<!-- ══════════════════ MENU ══════════════════ -->
<div class="screen" id="menuScreen">
  <div class="menu-logo">BLOCK BLAST</div>
  <div class="menu-sub">elige tu modo</div>
  <div class="mode-cards">
    <div class="mc cc" id="btnClassic"><div class="mc-icon">🎮</div><div class="mc-name">Clásico</div><div class="mc-desc">Sin presión. Juega y supera tu récord.</div></div>
    <div class="mc rc" id="btnRanked"><div class="mc-icon">🏆</div><div class="mc-name">Clasificatorio</div><div class="mc-badge">⚔ RANK</div><div class="mc-desc">Gana puntos de rango y llega a Némesis.</div></div>
  </div>
  <div class="menu-bottom">
    <div class="menu-rank-box">
      <div class="mrb-icon" id="mrb-icon">🥉</div>
      <div><div class="mrb-name" id="mrb-name">Bronce I</div><div class="mrb-pts" id="mrb-pts">0 PTS</div></div>
    </div>
    <button class="icon-btn" id="btnOpenSettings" title="Configuración">⚙️</button>
  </div>
</div>

<!-- ══════════════════ SETTINGS SCREEN (from menu) ══════════════════ -->
<div class="screen hidden" id="settingsScreen">
  <div class="spanel" id="settingsPanelMain"></div>
</div>

<!-- ══════════════════ GAME SCREEN ══════════════════ -->
<div class="screen hidden" id="gameScreen">
  <div id="app">
    <div class="top-bar">
      <button class="btn-back" id="btnBack">←</button>
      <div class="score-box"><div class="score-lbl">SCORE</div><div class="score-val" id="scoreVal">0</div></div>
      <div class="best-box"><div class="best-lbl" id="bestLbl">MEJOR</div><div class="best-val" id="bestVal">0</div></div>
      <button class="btn-gear" id="btnIngameGear" title="Configuración">⚙️</button>
    </div>
    <div id="rankBar" class="hidden">
      <div class="rb-icon" id="rb-icon">🥉</div>
      <div class="rb-info">
        <div class="rb-name" id="rb-name">Bronce I</div>
        <div class="rb-row">
          <div class="rb-pts" id="rb-pts">0</div>
          <div class="rb-bar"><div class="rb-fill" id="rb-fill" style="width:0%"></div></div>
          <div class="rb-next" id="rb-next">400</div>
        </div>
      </div>
    </div>
    <div id="boardWrap"><div id="board"></div></div>
    <div class="combo-row">🔥 COMBO <span class="combo-val" id="comboVal">0</span></div>
    <div id="tray"><div class="ps" id="slot0"></div><div class="ps" id="slot1"></div><div class="ps" id="slot2"></div></div>
  </div>
</div>

<!-- ══════════════════ IN-GAME SETTINGS OVERLAY ══════════════════ -->
<div class="ig-overlay" id="ingameSettingsOverlay">
  <div class="spanel" id="settingsPanelIngame"></div>
</div>

<!-- ══════════════════ GAME OVER ══════════════════ -->
<div id="gameOver">
  <div class="go-title">GAME OVER</div>
  <div class="go-row">PUNTUACIÓN<span id="goScore">0</span></div>
  <div class="go-row">MEJOR<span id="goBest">0</span></div>
  <div id="rupCard"><div class="rup-title">✨ ¡SUBISTE DE RANGO!</div><div class="rup-icon" id="rup-icon">🥈</div><div class="rup-name" id="rup-name">Plata I</div></div>
  <div class="go-row" id="goRankRow" style="display:none">RANGO ACTUAL<span id="goRankSpan"></span></div>
  <div class="go-btn-row">
    <button class="go-btn go-btn-menu" id="goMenuBtn">MENÚ</button>
    <button class="go-btn go-btn-play" id="goPlayBtn">JUGAR DE NUEVO</button>

  const voices = speechSynthesis.getVoices();

    v.lang.startsWith('es') && /male|hombre|man|jorge|miguel|diego|carlos|pablo/i.test(v.name)

  const esAny = voices.find(v => v.lang.startsWith('es'));
  const deepAny = voices.find(v => /male|man|jorge|miguel|diego|carlos|david|mark|paul/i.test(v.name));
  maleVoice = esMale || deepAny || esAny || voices[0] || null;
}
speechSynthesis.onvoiceschanged = loadVoices;

function speakCombo(text) {
  if (!CFG.voice) return;

  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);

  utt.rate = 1.05;
  utt.pitch = 0.45;  // Very low pitch = deep male voice
  utt.volume = CFG.voiceVol / 100;

  o1.type='sine';o1.frequency.value=freq;
  o2.type='sine';o2.frequency.value=freq*2;
  o3.type='sine';o3.frequency.value=freq*4;
  const env=ac.createGain();
  env.gain.setValueAtTime(0,t0);
  env.gain.linearRampToValueAtTime(vol,t0+0.012);
  env.gain.exponentialRampToValueAtTime(vol*.6,t0+0.08);
  env.gain.exponentialRampToValueAtTime(vol*.3,t0+dur*.5);
  env.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  const mx=ac.createGain(),g2=ac.createGain(),g3=ac.createGain();
  g2.gain.value=0.35;g3.gain.value=0.12;
  o1.connect(mx);o2.connect(g2);g2.connect(mx);o3.connect(g3);g3.connect(mx);

}

function scheduleTrack(ti,t0){
  if(!CFG.music)return;

  tr.melody.forEach(n=>piano(mtof(n.n),t0+n.b*B,n.d*B*.9,vol*.9));
  tr.bass.forEach(n=>piano(mtof(n.n-12),t0+n.b*B,n.d*B*1.1,vol*.35));
  trackTO=setTimeout(()=>{if(musicOn)scheduleTrack(ti,ac.currentTime);},tr.total*B*1000-500);
}

  g.style.gridTemplateColumns=`repeat(${piece.w},${sz}px)`;g.style.gridTemplateRows=`repeat(${piece.h},${sz}px)`;g.style.gap=gap+'px';

    <button class="sclose" data-close>✕</button>
  </div>

  <div class="ssec">
    <div class="ssec-t">🎵 Música de Piano</div>
    <div class="srow">
      <div class="slw"><div class="slbl">Música</div><div class="sdesc">Música de fondo</div></div>
      <label class="tog"><input type="checkbox" data-cfg="music" ${CFG.music?'checked':''}><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="swrap">
      <div class="slbl" style="font-size:11px">Volumen música</div>
      <div class="swrow"><input type="range" class="ssl" data-cfg="musicVol" min="0" max="100" value="${CFG.musicVol}"><span class="sval" data-val="musicVol">${CFG.musicVol}%</span></div>
    </div>
    <div class="song-grid">
      ${TRACKS.map((tr,i)=>`
        <div class="song-btn${CFG.track===i?' active':''}" data-track="${i}">
          <div class="song-top"><span>${tr.icon} ${tr.name}</span><div class="pbars"><span></span><span></span><span></span></div></div>
          <div class="song-desc">${tr.desc}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="ssec">
    <div class="ssec-t">🔊 Efectos & Voz</div>
    <div class="srow">
      <div class="slw"><div class="slbl">Efectos de sonido</div><div class="sdesc">Sonidos al colocar y limpiar</div></div>
      <label class="tog"><input type="checkbox" data-cfg="sfx" ${CFG.sfx?'checked':''}><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="swrap">
      <div class="slbl" style="font-size:11px">Volumen efectos</div>
      <div class="swrow"><input type="range" class="ssl" data-cfg="sfxVol" min="0" max="100" value="${CFG.sfxVol}"><span class="sval" data-val="sfxVol">${CFG.sfxVol}%</span></div>
    </div>
    <div class="srow">
      <div class="slw"><div class="slbl">Voz de combo</div><div class="sdesc">Voz masculina anuncia los combos</div></div>
      <label class="tog"><input type="checkbox" data-cfg="voice" ${CFG.voice?'checked':''}><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="swrap">
      <div class="slbl" style="font-size:11px">Volumen voz</div>
      <div class="swrow"><input type="range" class="ssl" data-cfg="voiceVol" min="0" max="100" value="${CFG.voiceVol}"><span class="sval" data-val="voiceVol">${CFG.voiceVol}%</span></div>
    </div>
  </div>

  <div class="ssec">
    <div class="ssec-t">🎨 Tema visual</div>
    <div class="theme-row">
      <div class="tdot${CFG.theme==='default'?' active':''}" data-t="default" style="background:linear-gradient(135deg,#ff6bff,#5bc8ff)" title="Galaxia"></div>
      <div class="tdot${CFG.theme==='ocean'?' active':''}"   data-t="ocean"   style="background:linear-gradient(135deg,#006aff,#00d4ff)" title="Océano"></div>
      <div class="tdot${CFG.theme==='forest'?' active':''}"  data-t="forest"  style="background:linear-gradient(135deg,#00a040,#4dff91)" title="Bosque"></div>
      <div class="tdot${CFG.theme==='sunset'?' active':''}"  data-t="sunset"  style="background:linear-gradient(135deg,#ff4400,#ff9a3c)" title="Atardecer"></div>
      <div class="tdot${CFG.theme==='rose'?' active':''}"    data-t="rose"    style="background:linear-gradient(135deg,#cc0055,#ff6baa)" title="Rosa"></div>
    </div>
  </div>

  <div class="ssec">
    <div class="ssec-t">🎮 Juego</div>
    <div class="srow">
      <div class="slw"><div class="slbl">Vibración</div><div class="sdesc">Al colocar piezas (móvil)</div></div>
      <label class="tog"><input type="checkbox" data-cfg="vibrate" ${CFG.vibrate?'checked':''}><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="srow">
      <div class="slw"><div class="slbl">Animaciones</div><div class="sdesc">Efectos al limpiar líneas</div></div>
      <label class="tog"><input type="checkbox" data-cfg="anims" ${CFG.anims?'checked':''}><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
  </div>

  <button class="btn-reset" data-resetrank>🗑 Reiniciar progreso de rango</button>
  `;

  // ── Close button
  container.querySelector('[data-close]').addEventListener('click', onClose);

  // ── Toggles
  container.querySelectorAll('.tog input[data-cfg]').forEach(inp => {
    inp.addEventListener('change', () => {
      const key = inp.dataset.cfg;
      CFG[key] = inp.checked;
      saveC();
      if (key === 'music') { CFG.music ? startMusic() : stopMusic(); }
    });
  });

  // ── Sliders
  container.querySelectorAll('.ssl[data-cfg]').forEach(sl => {
    sl.addEventListener('input', () => {
      const key = sl.dataset.cfg;
      CFG[key] = +sl.value;
      const valEl = container.querySelector(`[data-val="${key}"]`);
      if (valEl) valEl.textContent = CFG[key] + '%';
      saveC();
      if (key === 'musicVol') applyMusicVol();
    });
  });

  // ── Tracks
  container.querySelectorAll('.song-btn[data-track]').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = +btn.dataset.track;
      if (t === CFG.track) return;
      CFG.track = t; saveC();
      container.querySelectorAll('.song-btn').forEach(b => b.classList.toggle('active', +b.dataset.track === t));
      if (musicOn) { stopMusic(); startMusic(); }
    });
  });

  // ── Theme dots
  container.querySelectorAll('.tdot[data-t]').forEach(dot => {
    dot.addEventListener('click', () => {
      CFG.theme = dot.dataset.t; saveC();
      applyTheme(CFG.theme);
      // Update all settings panels
      document.querySelectorAll('.tdot').forEach(d => d.classList.toggle('active', d.dataset.t === CFG.theme));
    });
  });

  // ── Reset rank
  container.querySelector('[data-resetrank]').addEventListener('click', () => {
    if (confirm('¿Reiniciar todo el progreso de rango? Esto no se puede deshacer.')) {
      saveRP(0); updateMenuRank();
      if (document.getElementById('menuScreen') && !document.getElementById('menuScreen').classList.contains('hidden')) updateMenuRank();
    }
  });
}

// ══════════════════════════════════════════════════════════
//  INIT GAME
// ══════════════════════════════════════════════════════════
function initGame(mode){
  gameMode=mode;
  grid=Array.from({length:R},()=>Array(C).fill(0));
  score=0;combo=0;tray=[null,null,null];prevRI=rIdx(rankPts);
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('comboVal').textContent='0';
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('rupCard').classList.remove('show');
  if(mode==='ranked'){
    document.getElementById('rankBar').classList.remove('hidden');
    document.getElementById('bestLbl').textContent='RANK PTS';
    document.getElementById('bestVal').textContent=rankPts;
    document.getElementById('bestVal').style.color=getRank(rankPts).color;
    updateRankBar();
  }else{
    document.getElementById('rankBar').classList.add('hidden');
    document.getElementById('bestLbl').textContent='MEJOR';
    document.getElementById('bestVal').textContent=cBest;
    document.getElementById('bestVal').style.color='var(--accent)';
    document.getElementById('boardWrap').style.background='linear-gradient(135deg,rgba(255,107,255,.3),rgba(91,200,255,.2))';
    document.getElementById('boardWrap').style.boxShadow='';
    document.getElementById('rankBar').style.borderColor='';
  }
  buildBoard();paintBoard();refillTray();showScreen('gameScreen');startMusic();
}

// ══════════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════════
function refillTray(){
  for(let i=0;i<3;i++)if(!tray[i])tray[i]={piece:PIECES[Math.floor(Math.random()*PIECES.length)],ci:Math.floor(Math.random()*COLORS.length)};
  if(tray.every(p=>!p))for(let i=0;i<3;i++)tray[i]={piece:PIECES[Math.floor(Math.random()*PIECES.length)],ci:Math.floor(Math.random()*COLORS.length)};
  renderTray();checkGO();
}
function canPlace(piece,r0,c0){for(const[dr,dc]of piece.s){const r=r0+dr,c=c0+dc;if(r<0||r>=R||c<0||c>=C||grid[r][c])return false;}return true;}
function placePiece(piece,ci,r0,c0){
  for(const[dr,dc]of piece.s){
    grid[r0+dr][c0+dc]=ci+1;const e=getCell(r0+dr,c0+dc);const col=COLORS[ci];
    e.className='cell filled'+(CFG.anims?' fi':'');e.style.background=`linear-gradient(135deg,${col.lt},${col.bg})`;
    if(CFG.anims)e.addEventListener('animationend',()=>e.classList.remove('fi'),{once:true});
  }
}
function clearLines(){
  const rowsC=[],colsC=[];
  for(let r=0;r<R;r++)if(grid[r].every(v=>v))rowsC.push(r);
  for(let c=0;c<C;c++)if(grid.every(row=>row[c]))colsC.push(c);
  const tot=rowsC.length+colsC.length;if(!tot)return 0;
  combo++;
  const pts=(rowsC.length*80+colsC.length*80)*(combo>1?combo:1);
  sfxClear(tot);

  // ── VOICE ANNOUNCEMENT ──────────────────────────────────
  const voiceLines={
    1: ['¡Bien!','¡Limpio!','¡Perfecto!'],
    2: ['¡Doble!','¡Combo!','¡Dos líneas!'],
    3: ['¡Triple!','¡Increíble!','¡Tres líneas!'],
    4: ['¡Cuádruple!','¡Brutal!','¡Cuatro líneas!'],
  };
  const comboLines=[
    '','',
    '¡Combo dos!','¡Combo tres!','¡Combo cuatro!',
    '¡Ultra combo!','¡Imparable!','¡Leyenda!',
  ];
  let phrase;
  if(combo>=2){
    phrase=comboLines[Math.min(combo,comboLines.length-1)];
  }else{
    const pool=voiceLines[Math.min(tot,4)]||voiceLines[4];
    phrase=pool[Math.floor(Math.random()*pool.length)];
  }
  setTimeout(()=>speakCombo(phrase),80);

  // ── FLASH MESSAGE ────────────────────────────────────────
  const msgs=combo>3?['🔥 ULTRA!','💥 BOOM!','✨ INSANO!']:combo>1?['COMBO!','DOBLE!','TRIPLE!']:tot>1?['MULTI!','LIMPIO!']:['¡BIEN!'];
  showFlash(msgs[Math.floor(Math.random()*msgs.length)],combo>2?'#ff4d6d':combo>1?'#ff9a3c':'#4dff91');

  if(CFG.anims){
    const anim=new Set();
    for(const r of rowsC)for(let c=0;c<C;c++)anim.add(r+','+c);
    for(const c of colsC)for(let r=0;r<R;r++)anim.add(r+','+c);
    for(const key of anim){
      const[r,c]=key.split(',').map(Number);const e=getCell(r,c);e.classList.add('clearing');
      const rc=e.getBoundingClientRect();spawnP(rc.left+rc.width/2,rc.top+rc.height/2,COLORS[(grid[r][c]||1)-1].bg,5);
    }
  }
  setTimeout(()=>{for(const r of rowsC)grid[r]=Array(C).fill(0);for(const c of colsC)for(let r=0;r<R;r++)grid[r][c]=0;paintBoard();},CFG.anims?350:0);
  return pts;
}
function showFlash(msg,col){const e=document.getElementById('flashMsg');e.textContent=msg;e.style.color=col;e.style.textShadow=`0 0 28px ${col}`;e.classList.remove('show');void e.offsetWidth;e.classList.add('show');}
function addScore(add){
  score+=add;
  if(gameMode==='classic'){if(score>cBest){saveCB(score);document.getElementById('bestVal').textContent=score;}}
  const e=document.getElementById('scoreVal');e.textContent=score;e.classList.remove('pop');void e.offsetWidth;if(add>0)e.classList.add('pop');
  if(gameMode==='ranked'&&add>0){
    const gain=Math.ceil(add*.5);const oldI=rIdx(rankPts);
    saveRP(rankPts+gain);
    document.getElementById('bestVal').textContent=rankPts;
    document.getElementById('bestVal').style.color=getRank(rankPts).color;
    updateRankBar();
    const newI=rIdx(rankPts);if(newI>oldI)showRankUpOv(RANKS[newI]);
  }
}
function checkGO(){
  const avail=tray.filter(Boolean);
  for(const{piece}of avail)for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(canPlace(piece,r,c))return;
  setTimeout(triggerGO,400);
}
function triggerGO(){
  sfxGO();speechSynthesis.cancel();
  document.getElementById('goScore').textContent=score;
  document.getElementById('goBest').textContent=gameMode==='classic'?cBest:rankPts;
  if(gameMode==='ranked'){
    const ci=rIdx(rankPts),rk=RANKS[ci];
    document.getElementById('goRankRow').style.display='block';
    document.getElementById('goRankSpan').textContent=rk.icon+' '+rk.name;
    document.getElementById('goRankSpan').style.color=rk.color;
    if(ci>prevRI){
      const rc=document.getElementById('rupCard');
      document.getElementById('rup-icon').textContent=rk.icon;
      document.getElementById('rup-name').textContent=rk.name;
      document.getElementById('rup-name').style.color=rk.color;
      rc.style.borderColor=rk.color;rc.style.boxShadow='0 0 28px '+rk.color+'88';
      rc.classList.add('show');
    }
  }else document.getElementById('goRankRow').style.display='none';
  document.getElementById('gameOver').classList.add('show');
  stopMusic();
}

// ══════════════════════════════════════════════════════════
//  DRAG & DROP
// ══════════════════════════════════════════════════════════
const ghost=document.getElementById('ghost'),ghostGrid=document.getElementById('ghostGrid');
function setupDrag(el,idx){el.addEventListener('mousedown',e=>startDrag(e,idx,'mouse'));el.addEventListener('touchstart',e=>startDrag(e,idx,'touch'),{passive:false});}
function startDrag(e,idx,type){
  e.preventDefault();const p=tray[idx];if(!p)return;
  getAC();dragging={idx,piece:p.piece,ci:p.ci};
  ghostGrid.innerHTML='';ghostGrid.appendChild(makePG(p.piece,p.ci,CPX,3));
  const pos=evtPos(e,type);mvGhost(pos.x,pos.y);ghost.style.display='block';
  document.getElementById('slot'+idx).classList.add('ds');
  if(type==='mouse'){addEventListener('mousemove',onMv);addEventListener('mouseup',onUp);}
  else{addEventListener('touchmove',onMv,{passive:false});addEventListener('touchend',onUp);}
}
function evtPos(e,type){if(type==='touch'||e.touches){const t=(e.touches||e.changedTouches)[0];return{x:t.clientX,y:t.clientY};}return{x:e.clientX,y:e.clientY};}
function mvGhost(x,y){const gw=dragging.piece.w*(CPX+3),gh=dragging.piece.h*(CPX+3);ghost.style.left=(x-gw/2)+'px';ghost.style.top=(y-gh-18)+'px';updateHover(x,y);}
function onMv(e){e.preventDefault();const p=evtPos(e,e.touches?'touch':'mouse');mvGhost(p.x,p.y);}
function updateHover(x,y){
  for(const{r,c}of hovCells){const e=getCell(r,c);if(e){e.classList.remove('hl','inv');e.style.background='';}}
  hovCells=[];paintBoard();
  const{r0,c0}=s2g(x,y);if(r0===-1)return;
  const ok=canPlace(dragging.piece,r0,c0);
  for(const[dr,dc]of dragging.piece.s){const r=r0+dr,c=c0+dc;if(r>=0&&r<R&&c>=0&&c<C){const e=getCell(r,c);if(e){e.classList.add(ok?'hl':'inv');hovCells.push({r,c});}}}
}
function s2g(x,y){
  const b=document.getElementById('board'),rc=b.getBoundingClientRect();
  const pad=8,gap=3,cw=(rc.width-pad*2-gap*7)/8,ch=(rc.height-pad*2-gap*7)/8;
  const gw=dragging.piece.w*(CPX+3),gh=dragging.piece.h*(CPX+3);
  const relX=(x-gw/2)-rc.left-pad,relY=(y-gh-18)-rc.top-pad;
  const c0=Math.round(relX/(cw+gap)),r0=Math.round(relY/(ch+gap));
  if(r0<-1||r0>R||c0<-1||c0>C)return{r0:-1,c0:-1};return{r0,c0};
}
function onUp(e){
  removeEventListener('mousemove',onMv);removeEventListener('mouseup',onUp);
  removeEventListener('touchmove',onMv);removeEventListener('touchend',onUp);
  ghost.style.display='none';
  document.getElementById('slot'+dragging.idx).classList.remove('ds');
  for(const{r,c}of hovCells){const e=getCell(r,c);if(e){e.classList.remove('hl','inv');e.style.background='';}}
  hovCells=[];
  const pos=evtPos(e,e.changedTouches?'touch':'mouse');
  const{r0,c0}=s2g(pos.x,pos.y);
  if(r0!==-1&&canPlace(dragging.piece,r0,c0)){
    placePiece(dragging.piece,dragging.ci,r0,c0);
    sfxPlace();
    if(CFG.vibrate&&navigator.vibrate)navigator.vibrate(18);
    tray[dragging.idx]=null;
    const pp=dragging.piece.s.length*10,cp=clearLines();
    if(!cp)combo=0;
    addScore(pp+cp);
    document.getElementById('comboVal').textContent=combo;
    renderTray();
    if(tray.every(p=>!p)){tray=[null,null,null];setTimeout(refillTray,400);}
    else setTimeout(checkGO,400);
  }else paintBoard();
  dragging=null;
}

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
function goMenu(){
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('ingameSettingsOverlay').classList.remove('show');
  stopMusic();speechSynthesis.cancel();
  updateMenuRank();showScreen('menuScreen');
}

// Menu settings
document.getElementById('btnOpenSettings').addEventListener('click',()=>{
  buildSettingsPanel(document.getElementById('settingsPanelMain'),()=>showScreen('menuScreen'));
  showScreen('settingsScreen');
});

// In-game settings (gear icon inside the game)
document.getElementById('btnIngameGear').addEventListener('click',()=>{
  buildSettingsPanel(document.getElementById('settingsPanelIngame'),()=>{
    document.getElementById('ingameSettingsOverlay').classList.remove('show');
  });
  document.getElementById('ingameSettingsOverlay').classList.add('show');
});
// Close overlay by clicking backdrop
document.getElementById('ingameSettingsOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('ingameSettingsOverlay'))
    document.getElementById('ingameSettingsOverlay').classList.remove('show');
});

document.getElementById('btnClassic').addEventListener('click',()=>initGame('classic'));
document.getElementById('btnRanked').addEventListener('click',()=>initGame('ranked'));
document.getElementById('btnBack').addEventListener('click',goMenu);
document.getElementById('goMenuBtn').addEventListener('click',goMenu);
document.getElementById('goPlayBtn').addEventListener('click',()=>{document.getElementById('gameOver').classList.remove('show');initGame(gameMode);});

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
applyTheme(CFG.theme);
updateMenuRank();
showScreen('menuScreen');
document.addEventListener('pointerdown',()=>{
  loadVoices();
  const ac=getAC();if(ac.state==='suspended')ac.resume();
},{once:true});
</script>
